version: "3.8"

# ─── JIRA Data Center + PostgreSQL + nginx reverse proxy ─────────────────────
# Usage:
#   cp docker/.env.example docker/.env
#   Edit docker/.env (set POSTGRES_PASSWORD at minimum)
#   docker compose -f docker/docker-compose.yml --env-file docker/.env up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── PostgreSQL 14 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:14-alpine
    container_name: jira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jiradb}
      POSTGRES_USER: ${POSTGRES_USER:-jira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    networks:
      - jira-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-jira} -d ${POSTGRES_DB:-jiradb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── JIRA Software (Data Center) ────────────────────────────────────────────
  jira:
    image: atlassian/jira-software:9.12.0
    container_name: jira-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8085:8080"
    environment:
      # Database
      ATL_JDBC_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jiradb}"
      ATL_JDBC_USER: ${POSTGRES_USER:-jira}
      ATL_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      ATL_DB_DRIVER: org.postgresql.Driver
      ATL_DB_TYPE: postgres72

      # Reverse-proxy headers (adjust if using nginx/HTTPS)
      ATL_PROXY_NAME: ${JIRA_HOSTNAME:-localhost}
      ATL_PROXY_PORT: ${JIRA_PROXY_PORT:-8080}
      ATL_TOMCAT_SCHEME: ${JIRA_SCHEME:-http}
      ATL_TOMCAT_SECURE: "false"

      # JVM tuning
      JVM_MINIMUM_MEMORY: 1024m
      JVM_MAXIMUM_MEMORY: 4096m

      # Session
      ATL_AUTOLOGIN_COOKIE_AGE: "28800"
    volumes:
      - jira-home:/var/atlassian/application-data/jira
    networks:
      - jira-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/status || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 15
      start_period: 120s # JIRA takes ~2 min to start initially

  # ─── nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: jira-nginx
    restart: unless-stopped
    depends_on:
      jira:
        condition: service_healthy
    ports:
      - "81:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro # Mount SSL certs (see docs/setup/)
    networks:
      - jira-net

# ─── Named Volumes ───────────────────────────────────────────────────────────
volumes:
  jira-home:
    driver: local
  postgres-data:
    driver: local

# ─── Network ─────────────────────────────────────────────────────────────────
networks:
  jira-net:
    driver: bridge

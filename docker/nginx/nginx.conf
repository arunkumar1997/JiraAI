worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

  access_log /var/log/nginx/access.log main;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;

  keepalive_timeout 65;
  client_max_body_size 100m;   # JIRA attachments can be large

  # ─── Upstream ───────────────────────────────────────────────────────────────
  upstream jira {
    server jira:8080;
    keepalive 32;
  }

  # ─── HTTP (redirect to HTTPS if SSL certs are present) ───────────────────────
  server {
    listen 80;
    server_name _;

    # Comment this block out if you only want plain HTTP (local dev)
    # location / {
    #   return 301 https://$host$request_uri;
    # }

    location / {
      proxy_pass         http://jira;
      proxy_http_version 1.1;

      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      # WebSocket support (JIRA uses SSE/WS for real-time updates)
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection "upgrade";

      proxy_read_timeout    300s;
      proxy_connect_timeout 60s;
      proxy_send_timeout    300s;

      proxy_buffering off;
    }
  }

  # ─── HTTPS (uncomment when SSL certs are in docker/nginx/ssl/) ───────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name _;

  #   ssl_certificate     /etc/nginx/ssl/jira.crt;
  #   ssl_certificate_key /etc/nginx/ssl/jira.key;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;

  #   location / {
  #     proxy_pass         http://jira;
  #     proxy_http_version 1.1;
  #     proxy_set_header Host              $host;
  #     proxy_set_header X-Real-IP         $remote_addr;
  #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto https;
  #     proxy_set_header Connection        "";
  #     proxy_read_timeout 300s;
  #     client_max_body_size 100m;
  #   }
  # }
}
